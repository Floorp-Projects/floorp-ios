name: Upstream Sync

on:
  # Every Monday at 09:00 UTC (18:00 JST)
  schedule:
    - cron: '0 9 * * 1'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/mozilla-mobile/firefox-ios.git || true
          git fetch upstream main

      - name: Check for new upstream commits
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          MERGE_BASE=$(git merge-base HEAD upstream/main)

          if [ "$MERGE_BASE" = "$UPSTREAM" ]; then
            echo "Already up to date. No new upstream commits."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMIT_COUNT=$(git rev-list --count "${MERGE_BASE}..${UPSTREAM}")
          echo "Found ${COMMIT_COUNT} new upstream commits."
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "commit_count=${COMMIT_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Merge upstream
        if: steps.check.outputs.has_changes == 'true'
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create a sync branch
          BRANCH="sync/upstream-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"

          # Attempt merge
          if git merge upstream/main --no-edit; then
            echo "merge_conflict=false" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ Merge conflicts detected — committing partial merge state."
            echo "merge_conflict=true" >> "$GITHUB_OUTPUT"
            # Commit the conflict markers so the PR shows the conflicted files
            git add -A
            git commit -m "merge: upstream sync (with conflicts — needs manual resolution)"
          fi
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Run rebrand script
        if: steps.merge.outputs.merge_conflict == 'false'
        run: |
          chmod +x ./scripts/rebrand-to-floorp.sh
          ./scripts/rebrand-to-floorp.sh

      - name: Verify changes
        if: steps.merge.outputs.merge_conflict == 'false'
        id: verify
        run: |
          CHANGED=$(git diff --stat HEAD | tail -1)
          echo "Changes: ${CHANGED}"
          FILE_COUNT=$(git diff --name-only HEAD | wc -l | tr -d ' ')
          echo "file_count=${FILE_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "feat: sync upstream and re-apply Floorp branding"
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          committer: GitHub <noreply@github.com>
          title: "🔄 Sync upstream (Firefox iOS) — ${{ steps.check.outputs.commit_count }} new commits"
          body: |
            ## 🔄 Upstream Sync (Firefox iOS → Floorp)

            Mozilla Firefox iOS の最新変更を Floorp にマージする PR です。

            ### 📊 概要
            - **アップストリームのコミット数**: ${{ steps.check.outputs.commit_count }} 件
            - **リブランドの変更ファイル数**: ${{ steps.verify.outputs.file_count }} 件（`rebrand-to-floorp.sh` による）
            - **コンフリクト**: ${{ steps.merge.outputs.merge_conflict == 'true' && '⚠️ **あり — 手動での解決が必要**' || 'なし ✅' }}

            ${{ steps.merge.outputs.merge_conflict == 'true' && '---\n\n## ⚠️ コンフリクトがあります — 以下の手順で解決してください\n\n### Step 1: ブランチをローカルに持ってくる\n\n```bash\ngit fetch origin\ngit checkout sync/upstream-$(date +%Y%m%d)\n# ブランチ名はこのPRのヘッドブランチを確認してください\n```\n\n### Step 2: コンフリクト箇所を確認する\n\nエディタで `<<<<<<<` / `=======` / `>>>>>>>` を検索し、各コンフリクトを解決します。\n\n- `<<<<<<< HEAD` 側 = Floorp の変更\n- `>>>>>>>` 側 = Firefox（upstream）の変更\n- 基本的には **upstream 側の変更を採用** し、その後の rebrand スクリプトで Floorp ブランディングを再適用します\n\n### Step 3: コンフリクトを解決してコミット\n\n```bash\n# コンフリクトを解決したファイルをステージング\ngit add <解決したファイル>\n\n# コンフリクト解決をコミット\ngit commit --no-edit\n```\n\n### Step 4: リブランドスクリプトを実行\n\n```bash\n# まずドライランで変更内容を確認\n./scripts/rebrand-to-floorp.sh --dry-run\n\n# 問題なければ実際に実行\n./scripts/rebrand-to-floorp.sh\n\n# 変更をコミット\ngit add -A\ngit commit -m "feat: re-apply Floorp branding after conflict resolution"\n```\n\n### Step 5: プッシュして PR を更新\n\n```bash\ngit push --no-verify origin HEAD\n```\n\n### Step 6: PR をマージ\n\nプッシュ後、CI が通ったことを確認してこの PR をマージしてください。\n\n---\n' || '' }}## ✅ マージ前のチェックリスト\n\n- [ ] 差分（diff）に予期しない変更がないか確認した\n- [ ] CI ビルドが成功した\n- [ ] 新しい Firefox ブランド素材が追加されていないか確認した\n  - もし追加されていたら `rebrand-to-floorp.sh` の対象リストに追加が必要かもしれません\n\n---\n*この PR は [Upstream Sync](.github/workflows/upstream-sync.yml) ワークフローによって自動生成されました。*
          branch: ${{ steps.merge.outputs.branch }}
          labels: upstream-sync, automated${{ steps.merge.outputs.merge_conflict == 'true' && ', merge-conflict' || '' }}
          token: ${{ secrets.GITHUB_TOKEN }}
