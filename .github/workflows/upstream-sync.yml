name: Upstream Sync

on:
  # Every Monday at 09:00 UTC (18:00 JST)
  schedule:
    - cron: '0 9 * * 1'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/mozilla-mobile/firefox-ios.git || true
          git fetch upstream main

      - name: Check for new upstream commits
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          MERGE_BASE=$(git merge-base HEAD upstream/main)

          if [ "$MERGE_BASE" = "$UPSTREAM" ]; then
            echo "Already up to date. No new upstream commits."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMIT_COUNT=$(git rev-list --count "${MERGE_BASE}..${UPSTREAM}")
          echo "Found ${COMMIT_COUNT} new upstream commits."
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "commit_count=${COMMIT_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Merge upstream
        if: steps.check.outputs.has_changes == 'true'
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create a sync branch
          BRANCH="sync/upstream-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"

          # Attempt merge
          if git merge upstream/main --no-edit; then
            echo "merge_conflict=false" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ Merge conflicts detected — committing partial merge state."
            echo "merge_conflict=true" >> "$GITHUB_OUTPUT"
            # Commit the conflict markers so the PR shows the conflicted files
            git add -A
            git commit -m "merge: upstream sync (with conflicts — needs manual resolution)"
          fi
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Run rebrand script
        if: steps.merge.outputs.merge_conflict == 'false'
        run: |
          chmod +x ./scripts/rebrand-to-floorp.sh
          ./scripts/rebrand-to-floorp.sh

      - name: Verify changes
        if: steps.merge.outputs.merge_conflict == 'false'
        id: verify
        run: |
          CHANGED=$(git diff --stat HEAD | tail -1)
          echo "Changes: ${CHANGED}"
          FILE_COUNT=$(git diff --name-only HEAD | wc -l | tr -d ' ')
          echo "file_count=${FILE_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "feat: sync upstream and re-apply Floorp branding"
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          committer: GitHub <noreply@github.com>
          title: "🔄 Sync upstream (Firefox iOS) — ${{ steps.check.outputs.commit_count }} new commits"
          body: |
            ## 🔄 Upstream Sync (Firefox iOS → Floorp)

            This PR merges the latest changes from [mozilla-mobile/firefox-ios](https://github.com/mozilla-mobile/firefox-ios) into Floorp.

            ### 📊 Summary
            - **Upstream commits**: ${{ steps.check.outputs.commit_count }}
            - **Rebrand changes**: ${{ steps.verify.outputs.file_count }} files modified by `rebrand-to-floorp.sh`
            - **Conflicts**: ${{ steps.merge.outputs.merge_conflict == 'true' && '⚠️ **Yes — manual resolution required**' || 'None ✅' }}

            ${{ steps.merge.outputs.merge_conflict == 'true' && '---\n\n## ⚠️ Merge Conflicts Detected — Follow these steps to resolve\n\n### Step 1: Check out this branch locally\n\n```bash\ngit fetch origin\ngit checkout <this-PR-branch-name>\n```\n\n### Step 2: Find conflict markers\n\nSearch for `<<<<<<<` / `=======` / `>>>>>>>` in your editor and resolve each conflict:\n\n- `<<<<<<< HEAD` side = Floorp changes\n- `>>>>>>>` side = Firefox (upstream) changes\n- **Always adopt the upstream side** — the rebrand script will re-apply Floorp branding afterward\n\n### Step 3: Commit the resolution\n\n```bash\ngit add <resolved-files>\ngit commit --no-edit\n```\n\n### Step 4: Run the rebrand script\n\n```bash\n# Preview changes first\n./scripts/rebrand-to-floorp.sh --dry-run\n\n# Apply changes\n./scripts/rebrand-to-floorp.sh\n\n# Commit\ngit add -A\ngit commit -m "feat: re-apply Floorp branding after conflict resolution"\n```\n\n### Step 5: Push and update this PR\n\n```bash\ngit push --no-verify origin HEAD\n```\n\n### Step 6: Merge this PR\n\nAfter pushing, confirm CI passes, then merge this PR.\n\n---\n' || '' }}## ✅ Pre-merge Checklist\n\n- [ ] Reviewed the diff for unexpected changes\n- [ ] CI build passes\n- [ ] No new Firefox-branded assets were introduced\n  - If any were found, they may need to be added to `rebrand-to-floorp.sh`\n\n---\n*This PR was automatically created by the [Upstream Sync](.github/workflows/upstream-sync.yml) workflow.*
          branch: ${{ steps.merge.outputs.branch }}
          labels: upstream-sync, automated${{ steps.merge.outputs.merge_conflict == 'true' && ', merge-conflict' || '' }}
          token: ${{ secrets.GITHUB_TOKEN }}
